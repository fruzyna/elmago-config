include:
  - immich.yml

services:

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    environment:
      - JELLYFIN_PublishedServerUrl=http://stream.fruzyna.net
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - /weeghman/gpu-config/jellyfin:/config
      - /weeghman/gpu-databases/jellyfin-cache:/cache
      - /weeghman/media/music:/media/music
      - /weeghman/media/movies:/media/movies
      - /weeghman/media/tv:/media/tv
    ports:
      - 8096:8096
      - 7359:7359/udp
    restart: unless-stopped

